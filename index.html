<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing to Square...</title>
    <script>
        window.onload = function() {
            // 1. Grab the ID from the URL (e.g., ?id=inv:12345)
            const urlParams = new URLSearchParams(window.location.search);
            const rawId = urlParams.get('id');

            // 2. Device Detection Engine
            const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            let targetUrl = "";

            // 3. Build the Target URL based on the device
            if (isMobile) {
                // MOBILE: Route to the Native iOS/Android App
                const invoicePath = rawId ? "view/" + rawId : "new";
                targetUrl = "square-register://invoice/" + invoicePath;
            } else {
                // DESKTOP: Route to the Web Dashboard
                if (rawId) {
                    targetUrl = "https://app.squareup.com/dashboard/invoices/" + rawId;
                } else {
                    targetUrl = "https://app.squareup.com/dashboard/invoices";
                }
            }

            // --- VISUAL DEBUGGER UI ---
            // Push the calculated data into the HTML so you can read it
            document.getElementById('debug-device').innerText = isMobile ? "Mobile (App Scheme)" : "Desktop (Web URL)";
            document.getElementById('debug-url').innerText = targetUrl;
            
            // Bind the URL to the manual fallback button
            document.getElementById('manual-btn').href = targetUrl;

            // 4. Fire the redirect immediately (Wrapped in a try/catch)
            try {
                window.location.replace(targetUrl);
            } catch (e) {
                document.getElementById('error-log').innerText = "Auto-redirect failed: " + e.message;
            }
        };
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 40px; color: #333; background: #f4f6f8; }
        .debug-box { margin: 20px auto; padding: 15px; max-width: 90%; background: #fff; border: 1px solid #ddd; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 14px; text-align: left; }
        .launch-btn { display: inline-block; background-color: #006aff; color: white; font-size: 18px; font-weight: bold; padding: 15px 30px; border-radius: 10px; text-decoration: none; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .launch-btn:active { background-color: #0050c2; }
        #error-log { color: red; margin-top: 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h2>Square Router</h2>

    <div class="debug-box">
        <strong>Detected Mode:</strong> <span id="debug-device">Calculating...</span><br><br>
        <strong>Target URL:</strong><br>
        <span id="debug-url" style="color: #006aff;">Calculating...</span>
    </div>

    <a id="manual-btn" href="#" class="launch-btn">Tap to Open Manually</a>

    <div id="error-log"></div>
</body>
</html>
